apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opentelemetry-collector
  template:
    metadata:
      labels:
        app: opentelemetry-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector:0.95.0
        command:
        - "/otelcol"
        - "--config=/conf/otel-collector-config.yaml"
        resources:
          limits:
            cpu: 200m
            memory: 200Mi
        volumeMounts:
        - name: config-volume   # Mounts the volume into the container filesystem
          mountPath: /conf
        ports:
        - containerPort: 4317
      
      # 🚀 FIX: Add this missing block to declare the volume and link it to the ConfigMap
      volumes:
      - name: config-volume
        configMap:
          name: otel-collector-config
