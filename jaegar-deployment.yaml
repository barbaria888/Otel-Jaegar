apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: default
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.53 
        ports:
        - containerPort: 16686 # Jaeger UI Port
        - containerPort: 14250 # Legacy Jaeger gRPC Collector Port
        - containerPort: 4317  # 🚀 ADDED: Native OTLP gRPC Receiver Port
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: default
spec:
  ports:
  - name: grpc
    port: 14250
    targetPort: 14250
  - name: otlp-grpc       #  ADDED: Routes OTLP traffic from OTel Collector
    port: 4317
    targetPort: 4317
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-ui
  namespace: default
spec:
  type: NodePort 
  ports:
  - name: http
    port: 16686
    targetPort: 16686
    nodePort: 30686 
  selector:
    app: jaeger
