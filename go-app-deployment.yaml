apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-trace-generator-deployment
  namespace: default
  labels:
    app: go-trace-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-trace-generator
  template:
    metadata:
      labels:
        app: go-trace-generator
    spec:
      containers:
      - name: trace-app
        image: hardik0811/otel-jaegar:latest
        imagePullPolicy: Always
